<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - Trevor Steinke</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 2rem; color: #60a5fa; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #334155;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #60a5fa;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        .section {
            background: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }
        .section h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: #94a3b8;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th { color: #94a3b8; font-weight: 500; }
        td { color: #f1f5f9; }
        .loading { color: #94a3b8; }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .back-link { display: inline-block; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to portfolio</a>
        <h1>📊 Analytics Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalViews">-</div>
                <div class="stat-label">Total Page Views</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uniqueVisitors">-</div>
                <div class="stat-label">Unique Visitors</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalContacts">-</div>
                <div class="stat-label">Contact Form Submissions</div>
            </div>
        </div>

        <div class="section">
            <h2>Top Pages</h2>
            <table>
                <thead>
                    <tr><th>Page</th><th>Views</th></tr>
                </thead>
                <tbody id="topPages">
                    <tr><td colspan="2" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="section">
            <h2>Top Referrers</h2>
            <table>
                <thead>
                    <tr><th>Source</th><th>Visits</th></tr>
                </thead>
                <tbody id="topReferrers">
                    <tr><td colspan="2" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="section">
            <h2>Recent Activity</h2>
            <table>
                <thead>
                    <tr><th>Page</th><th>Time</th></tr>
                </thead>
                <tbody id="recentActivity">
                    <tr><td colspan="2" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.trevorsteinke.com:8443/api/analytics/stats';

        async function loadStats() {
            try {
                // Get credentials from localStorage or prompt
                let credentials = localStorage.getItem('analytics_credentials');
                
                if (!credentials) {
                    const user = prompt('Username:');
                    const pass = prompt('Password:');
                    if (!user || !pass) {
                        alert('Authentication required');
                        return;
                    }
                    credentials = btoa(user + ':' + pass);
                    localStorage.setItem('analytics_credentials', credentials);
                }

                const res = await fetch(API_URL, {
                    headers: {
                        'Authorization': 'Basic ' + credentials
                    }
                });
                
                if (res.status === 401) {
                    localStorage.removeItem('analytics_credentials');
                    const user = prompt('Username:');
                    const pass = prompt('Password:');
                    if (!user || !pass) {
                        alert('Authentication required');
                        return;
                    }
                    credentials = btoa(user + ':' + pass);
                    localStorage.setItem('analytics_credentials', credentials);
                    
                    const retryRes = await fetch(API_URL, {
                        headers: {
                            'Authorization': 'Basic ' + credentials
                        }
                    });
                    
                    if (!retryRes.ok) {
                        throw new Error('Invalid credentials');
                    }
                    
                    const data = await retryRes.json();
                    renderStats(data);
                    return;
                }
                
                const data = await res.json();
                renderStats(data);

            } catch (err) {
                console.error('Failed to load stats:', err);
                document.querySelectorAll('.loading').forEach(el => {
                    el.textContent = 'Failed to load data';
                });
            }
        }

        function renderStats(data) {
            document.getElementById('totalViews').textContent = data.totalViews.toLocaleString();
            document.getElementById('uniqueVisitors').textContent = data.uniqueVisitors.toLocaleString();
            document.getElementById('totalContacts').textContent = data.totalContacts.toLocaleString();

            // Top Pages
            const topPagesEl = document.getElementById('topPages');
            if (data.topPages.length === 0) {
                topPagesEl.innerHTML = '<tr><td colspan="2">No data yet</td></tr>';
            } else {
                topPagesEl.innerHTML = data.topPages.map(p => 
                    `<tr><td>${p.path}</td><td>${p.views}</td></tr>`
                ).join('');
            }

            // Top Referrers
            const referrersEl = document.getElementById('topReferrers');
            if (data.topReferrers.length === 0) {
                referrersEl.innerHTML = '<tr><td colspan="2">No data yet</td></tr>';
            } else {
                referrersEl.innerHTML = data.topReferrers.map(r => {
                    const ref = r.referrer || 'Direct';
                    const display = ref.length > 50 ? ref.substring(0, 50) + '...' : ref;
                    return `<tr><td>${display}</td><td>${r.count}</td></tr>`;
                }).join('');
            }

            // Recent Activity
            const activityEl = document.getElementById('recentActivity');
            if (data.recentActivity.length === 0) {
                activityEl.innerHTML = '<tr><td colspan="2">No data yet</td></tr>';
            } else {
                activityEl.innerHTML = data.recentActivity.map(a => {
                    const time = new Date(a.created_at).toLocaleString();
                    return `<tr><td>${a.path}</td><td>${time}</td></tr>`;
                }).join('');
            }
        }

        loadStats();
    </script>
</body>
</html>
